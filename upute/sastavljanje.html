<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DO NOT INDEX: page is for internal QR instructions -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
    <meta name="googlebot" content="noindex, nofollow">

    <title>Assembly instructions</title>

    <!-- Fonts (consistent with the rest of the site) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1a1a1a;
            background: #fafafa;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        header {
            text-align: center;
            padding: 16px 0 32px;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Lexend', sans-serif;
            font-size: 26px;
            font-weight: 700;
            margin: 0 0 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #666;
            font-size: 15px;
            margin: 0;
        }

        .intro {
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            padding: 16px 20px;
            margin-bottom: 40px;
            font-size: 15px;
            color: #333;
        }

        .step {
            margin-bottom: 44px;
        }

        .step-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 14px;
        }

        .step-number {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: #1a1a1a;
            color: #fff;
            border-radius: 50%;
            font-family: 'Lexend', sans-serif;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .step-title {
            font-family: 'Lexend', sans-serif;
            font-size: 19px;
            font-weight: 600;
            margin: 0;
        }

        .step-image {
            width: 100%;
            background: #fff;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 14px;
        }

        .step-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .step-variants {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 520px) {
            .step-variants {
                grid-template-columns: 1fr 1fr;
            }
        }

        .step-description {
            font-size: 16px;
            color: #333;
            margin: 0;
        }

        footer {
            margin-top: 56px;
            padding-top: 28px;
            border-top: 1px solid #e5e5e5;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        footer p { margin: 4px 0; }
        footer a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 600;
        }
        footer a:hover { text-decoration: underline; }

        @media (min-width: 640px) {
            .container { padding: 40px 24px 64px; }
            h1 { font-size: 32px; }
            .step-title { font-size: 21px; }
        }
    </style>
</head>
<body>
    <div class="container">

        <header>
            <h1>Instructions for assembly &mdash; darts lightning ring</h1>
            <p class="subtitle">13 steps</p>
        </header>

        <main>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">1</div>
                </div>
                <div class="step-image">
                    <img src="pics/1.png" alt="Step 1">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">2</div>
                </div>
                <div class="step-image">
                    <img src="pics/2.png" alt="Step 2">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">3</div>
                </div>
                <div class="step-image">
                    <img src="pics/3.png" alt="Step 3">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">4</div>
                </div>
                <div class="step-image">
                    <img src="pics/4.png" alt="Step 4">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">5</div>
                </div>
                <div class="step-image">
                    <img src="pics/5.png" alt="Step 5">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">6</div>
                </div>
                <div class="step-image">
                    <img src="pics/6.png" alt="Step 6">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">7</div>
                </div>
                <div class="step-image">
                    <img src="pics/7.png" alt="Step 7">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">8</div>
                </div>
                <div class="step-image">
                    <img src="pics/8.png" alt="Step 8">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">9</div>
                </div>
                <div class="step-image">
                    <img src="pics/9.png" alt="Step 9">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">10</div>
                </div>
                <div class="step-variants">
                    <div class="step-image">
                        <img src="pics/10a.png" alt="Step 10 - variant A">
                    </div>
                    <div class="step-image">
                        <img src="pics/10b.png" alt="Step 10 - variant B">
                    </div>
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">11</div>
                </div>
                <div class="step-image">
                    <img src="pics/11.png" alt="Step 11">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">12</div>
                </div>
                <div class="step-image">
                    <img src="pics/12.png" alt="Step 12">
                </div>
            </section>

            <section class="step">
                <div class="step-header">
                    <div class="step-number">13</div>
                </div>
                <div class="step-image">
                    <img src="pics/13.png" alt="Step 13">
                </div>
            </section>

        </main>

        <footer>
            <p>Assembly problem?</p>
            <p><a href="mailto:info@kti.hr">info@kti.hr</a></p>
            <p style="margin-top:16px; font-size:12px; color:#999;">&copy; Konstrukt Tech Inženjering d.o.o.</p>
        </footer>

    </div>
</body>
</html>
